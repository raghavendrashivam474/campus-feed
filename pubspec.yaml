name: college_engagement_app
description: A closed, anonymous college engagement platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Compatible versions
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5

  # State Management
  provider: ^6.1.1

  # UI/UX
  google_fonts: ^6.1.0
  timeago: ^3.6.0

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true